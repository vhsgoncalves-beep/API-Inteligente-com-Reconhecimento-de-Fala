# Mude apenas o nome da aplicação para o SEU nome ou um nome novo
spring.application.name=projeto-ia-transcricao-seu-nome

# PostgreSQL
# Certifique-se de que essas variáveis (DATABASE_URL, etc) estão no seu Sistema Operacional.
# Se não estiverem, você deve substituir o ${...} pelos valores reais do seu banco.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OpenAI base
spring.ai.openai.api-key=${GROQ_API_KEY}

# Desabilita modelos não usados
spring.ai.openai.audio.speech.enabled=false
spring.ai.openai.embedding.enabled=false
spring.ai.openai.image.enabled=false

# Groq para transcrição
spring.ai.openai.audio.transcription.base-url=https://api.groq.com/openai
spring.ai.openai.audio.transcription.api-key=${GROQ_API_KEY}
# ADICIONE ESTA LINHA ABAIXO: Define qual modelo de áudio a Groq vai usar
spring.ai.openai.audio.transcription.options.model=whisper-large-v3

# Groq para chat
spring.ai.openai.chat.base-url=https://api.groq.com/openai
spring.ai.openai.chat.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# ADICIONE ESTAS DUAS LINHAS: Evita erro de "arquivo muito grande" ao enviar o áudio
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB